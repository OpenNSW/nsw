apiVersion: openchoreo.dev/v1alpha1

metadata:
  name: nsw-backend

endpoints:
  - name: api
    port: 8080
    type: REST
    basePath: /api/v1
    visibility:
      - external

configurations:
  env:
    # Database
    - name: DB_HOST
      valueFrom:
        secretKeyRef:
          name: nsw-db-secrets
          key: host
    - name: DB_PORT
      valueFrom:
        secretKeyRef:
          name: nsw-db-secrets
          key: port
    - name: DB_USERNAME
      valueFrom:
        secretKeyRef:
          name: nsw-db-secrets
          key: username
    - name: DB_PASSWORD
      valueFrom:
        secretKeyRef:
          name: nsw-db-secrets
          key: password
    - name: DB_NAME
      valueFrom:
        secretKeyRef:
          name: nsw-db-secrets
          key: database
    - name: DB_SSLMODE
      value: require
    # Auth
    - name: AUTH_JWKS_URL
      valueFrom:
        secretKeyRef:
          name: nsw-auth-secrets
          key: jwks-url
    - name: AUTH_ISSUER
      valueFrom:
        secretKeyRef:
          name: nsw-auth-secrets
          key: issuer
    - name: AUTH_CLIENT_ID
      valueFrom:
        secretKeyRef:
          name: nsw-auth-secrets
          key: client-id
    - name: AUTH_AUDIENCE
      valueFrom:
        secretKeyRef:
          name: nsw-auth-secrets
          key: audience
    # CORS
    - name: CORS_ALLOWED_ORIGINS
      valueFrom:
        secretKeyRef:
          name: nsw-backend-secrets
          key: cors-allowed-origins
    # Storage
    - name: STORAGE_TYPE
      value: local
    - name: STORAGE_LOCAL_BASE_DIR
      value: /data/uploads
    - name: STORAGE_LOCAL_PUBLIC_URL
      value: /bucket
