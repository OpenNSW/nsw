server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/json;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Content-Security-Policy "default-src 'self'; connect-src 'self' https: http:; script-src 'self'; style-src 'self' 'unsafe-inline'; object-src 'none'; img-src 'self' data:; font-src 'self';" always;
    location = /config.js {
        expires -1;
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Content-Type "application/javascript" always;
    }
    location ~* "^.+\.[a-f0-9]{6,}\.(jpg|jpeg|png|gif|ico|css|js|svg|woff|woff2|ttf|eot)$" {
        expires 1y;
        add_header Cache-Control "public, immutable" always;
    }
    location / {
        try_files $uri $uri/ /index.html;
    }
    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain always;
    }
}
