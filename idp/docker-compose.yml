services:
  # Initialize database from the image
  thunderid-db-init:
    image: ghcr.io/thunder-id/thunderid:0.42.0
    command: sh -c "cp -r /opt/thunderid/repository/database/* /data/ && (cp -r /opt/thunderid/consent/repository/database/* /consent-data/ 2>/dev/null || true)"
    volumes:
      - thunderid-db:/data
      - consent-db:/consent-data
    restart: "no"

  # Run setup once with the shared database
  thunderid-setup:
    image: ghcr.io/thunder-id/thunderid:0.42.0
    command: ./setup.sh
    env_file:
      - .env
    volumes:
      - thunderid-db:/opt/thunderid/repository/database
      - consent-db:/opt/thunderid/consent/repository/database
      - ./02-sample-resources.sh:/opt/thunderid/bootstrap/02-sample-resources.sh
    depends_on:
      thunderid-db-init:
        condition: service_completed_successfully
    restart: "no"

  # Run ThunderID server with the shared database
  thunderid:
    image: ghcr.io/thunder-id/thunderid:0.42.0
    depends_on:
      thunderid-setup:
        condition: service_completed_successfully
    ports:
      - "${PORT:-8090}:${PORT:-8090}"
    env_file:
      - .env
    volumes:
      - thunderid-db:/opt/thunderid/repository/database
      - consent-db:/opt/thunderid/consent/repository/database
      - ./deployment.yaml:/opt/thunderid/repository/conf/deployment.yaml

volumes:
  thunderid-db:
    driver: local
  consent-db:
    driver: local
