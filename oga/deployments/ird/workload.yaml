apiVersion: openchoreo.dev/v1alpha1
metadata:
  name: nsw-oga-ird
endpoints:
  - name: api
    port: 8083
    type: REST
configurations:
  env:
    - name: OGA_PORT
      value: "8083"
    - name: OGA_DB_PATH
      value: /data/ird.db
    - name: OGA_FORMS_PATH
      value: /app/data/forms
    - name: OGA_ALLOWED_ORIGINS
      value: "*"
