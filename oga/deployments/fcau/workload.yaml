apiVersion: openchoreo.dev/v1alpha1
metadata:
  name: nsw-oga-fcau
endpoints:
  - name: api
    port: 8082
    type: REST
configurations:
  env:
    - name: OGA_PORT
      value: "8082"
    - name: OGA_DB_PATH
      value: /data/fcau.db
    - name: OGA_FORMS_PATH
      value: /app/data/forms
    - name: OGA_ALLOWED_ORIGINS
      value: "*"
