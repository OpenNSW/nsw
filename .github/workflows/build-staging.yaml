name: Build and Push Staging Images
 
on:
  release:
    types: [ published ]
  workflow_dispatch:
 
permissions:
  contents: read
  packages: write
 
env:
  REGISTRY: ghcr.io
 
jobs:
  build-and-push-staging:
    name: Build & Push Staging - ${{ matrix.service_name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - service_name: NSW Backend API
            image_name: nsw-backend
            context: ./backend
            dockerfile: ./backend/Dockerfile
          - service_name: NSW DB Migrations
            image_name: nsw-api-migrations
            context: .
            dockerfile: ./backend/migrations.Dockerfile
          - service_name: Trader Portal
            image_name: trader-app
            context: ./portals
            dockerfile: ./portals/apps/trader-app/Dockerfile
 
    steps:
      - name: Checkout Application Repository
        uses: actions/checkout@v4
 
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
 
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
 
      - name: Convert repository owner to lowercase
        id: repo_owner
        run: echo "owner=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"
 
      - name: Extract Release Tag
        id: release_tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=latest" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${{ github.event.release.tag_name }}" >> "$GITHUB_OUTPUT"
          fi
 
      - name: Build and Push Docker Image
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ steps.repo_owner.outputs.owner }}/${{ matrix.image_name }}:staging-${{ steps.release_tag.outputs.tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max