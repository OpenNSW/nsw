# Thunder IDP Production Overrides

deployment:
  replicaCount: 3

# High-performance production resources
resources:
  limits:
    cpu: 1000m
    memory: 2Gi
  requests:
    cpu: 200m
    memory: 512Mi

configuration:
  database:
    config:
      name: "configdb_prod"
    runtime:
      name: "runtimedb_prod"
    user:
      name: "userdb_prod"
