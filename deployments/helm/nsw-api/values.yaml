# Default values for nsw-api.
global:
  namespace: "national-single-window-platform"
  clusterDomain: "apps.sovecloud1.akaza.lk"

fullnameOverride: ""
replicaCount: 1

image:
  repository: ghcr.io/opennsw/nsw-api
  pullPolicy: Always
  tag: latest

imagePullSecrets:
  - name: ghcr-secret

podSecurityContext:
  runAsNonRoot: true

securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL

service:
  type: ClusterIP
  port: 80
  targetPort: 8080
  useWorkflowManagerV2: true
  temporalHost: "temporal-server:7233"
  temporalNamespace: "default"

config:
  server:
    port: 8080
    debug: false
    logLevel: "info"

  database:
    host: "nsw-db"
    port: 5432
    name: "nsw_db"
    username: "postgres"
    # password comes from Secret: nsw-db-credentials.password
    sslMode: "disable"

  auth:
    # Use the internal service name and port 8090
    jwksUrl: "http://idp-thunder-service.{{ .Release.Namespace }}.svc.cluster.local:8090/oauth2/jwks"
    issuer: "https://idp-thunder-{{ .Release.Namespace }}.{{ .Values.global.clusterDomain }}"
    audience: "TRADER_PORTAL_APP"
    clientId: "TRADER_PORTAL_APP"
    # Set to true if the IDP is using a self-signed cert internally (common in GovCloud)
    insecureSkipTlsVerify: true

  serviceUrl: "https://{{ include \"nsw-api.fullname\" . }}.{{ .Release.Namespace }}.{{ .Values.global.clusterDomain }}"
  internalServiceUrl: "http://nsw-api.{{ .Release.Namespace }}.svc.cluster.local"

  cors:
    allowedOrigins: "https://trader-app.{{ .Release.Namespace }}.{{ .Values.global.clusterDomain }},https://oga-fcau.{{ .Release.Namespace }}.{{ .Values.global.clusterDomain }},https://oga-ird.{{ .Release.Namespace }}.{{ .Values.global.clusterDomain }},https://oga-npqs.{{ .Release.Namespace }}.{{ .Values.global.clusterDomain }}"

  storage:
    type: "local"
    localBaseDir: "/tmp/bucket"
    localPublicUrl: "/api/v1/uploads"
    # S3 config — only used when storage.type is "s3"
    s3Endpoint: ""
    s3Bucket: "nsw-uploads"
    s3Region: "us-east-1"
    s3UseSsl: true
    s3PublicUrl: ""

resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 100m
    memory: 256Mi

route:
  enabled: false
  tls:
    enabled: false
    termination: edge
    insecureEdgeTerminationPolicy: Redirect

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 5
  targetCPUUtilizationPercentage: 80
  targetMemoryUtilizationPercentage: 80

podDisruptionBudget:
  enabled: false
  minAvailable: 1

dbMigrations:
  enabled: true
  image:
    repository: ghcr.io/opennsw/nsw-api-migrations
    tag: 1.0.0
    pullPolicy: Always
  backoffLimit: 3
  host: nsw-db
  port: 5432
  database: nsw_dev
  secretName: dev-nsw-db-credentials
  secretKey: password
  podSecurityContext:
    runAsNonRoot: true
    seccompProfile:
      type: RuntimeDefault
  securityContext:
    allowPrivilegeEscalation: false
    capabilities:
      drop:
        - ALL
    readOnlyRootFilesystem: true
  resources:
    limits:
      cpu: 100m
      memory: 128Mi
    requests:
      cpu: 10m
      memory: 64Mi
  user: postgres

