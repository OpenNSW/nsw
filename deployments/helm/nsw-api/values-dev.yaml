# Dev Overrides for nsw-api

global:
  clusterDomain: "apps.sovecloud1.akaza.lk"
  namespace: "national-single-window-platform"

replicaCount: 1

config:
  nswApiBaseUrl: "https://dev-nsw-api-national-single-window-platform.apps.sovecloud1.akaza.lk/api/v1"
  serviceUrl: "https://dev-nsw-api-national-single-window-platform.apps.sovecloud1.akaza.lk/api/v1"
  database:
    host: "nsw-db"
    name: "nsw_dev"
    user: "postgres"
    credentialsSecretName: "nsw-db-credentials"
  auth:
    issuer: "https://idp-thunder-national-single-window-platform.apps.sovecloud1.akaza.lk"
    jwksUrl: "https://idp-thunder-national-single-window-platform.apps.sovecloud1.akaza.lk/oauth2/jwks"
    clientId: "TRADER_PORTAL_APP"
    credentialsSecretName: "nsw-api-auth-credentials"
  cors:
    allowedOrigins: "https://dev-trader-app-{{ .Values.global.namespace }}.{{ .Values.global.clusterDomain }},https://dev-oga-fcau-{{ .Values.global.namespace }}.{{ .Values.global.clusterDomain }},https://dev-oga-ird-{{ .Values.global.namespace }}.{{ .Values.global.clusterDomain }},https://dev-oga-npqs-{{ .Values.global.namespace }}.{{ .Values.global.clusterDomain }}"

service:
  temporalHost: "temporal-server:7233"
  temporalNamespace: "nsw-dev"

route:
  enabled: true
  host: ""
  tls:
    enabled: true
    termination: edge
    insecureEdgeTerminationPolicy: Redirect
