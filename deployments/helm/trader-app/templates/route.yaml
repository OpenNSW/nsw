{{- if .Values.route.enabled }}
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: {{ include "trader-app.fullname" . }}
  labels:
    app.kubernetes.io/name: {{ include "trader-app.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  host: {{ if .Values.route.host }}{{ .Values.route.host }}{{ else }}{{ include "trader-app.fullname" . }}.{{ .Values.global.namespace }}.{{ .Values.global.clusterDomain }}{{ end }}
  to:
    kind: Service
    name: {{ include "trader-app.fullname" . }}
    weight: 100
  port:
    targetPort: http
  {{- if .Values.route.tls.enabled }}
  tls:
    termination: {{ .Values.route.tls.termination | default "edge" | quote }}
    insecureEdgeTerminationPolicy: {{ .Values.route.tls.insecureEdgeTerminationPolicy | default "Redirect" | quote }}
  {{- end }}
{{- end }}
