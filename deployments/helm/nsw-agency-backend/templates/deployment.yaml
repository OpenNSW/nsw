apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "nsw-agency-backend.fullname" . }}
  labels:
    {{- include "nsw-agency-backend.labels" . | nindent 4 }}
spec:
{{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount | default 1 }}
{{- end }}
  selector:
    matchLabels:
      {{- include "nsw-agency-backend.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "nsw-agency-backend.selectorLabels" . | nindent 8 }}
    spec:
      {{- if .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml .Values.imagePullSecrets | nindent 8 }}
      {{- end }}
      {{- if .Values.templates.enabled }}
      initContainers:
        - name: copy-templates
          image: "{{ .Values.templates.image.repository }}:{{ .Values.templates.image.tag | default "dev-latest" }}"
          imagePullPolicy: {{ .Values.templates.image.pullPolicy | default "IfNotPresent" }}
          command:
            - sh
            - -c
            - |
              echo "Copying all JSON forms from /app/configs/fcau into shared volume..."
              find /app/configs/fcau -name "*_jsonform.json" -exec cp {} /shared/ \;
              echo "Done. Files copied:"
              ls /shared/
          volumeMounts:
            - name: forms-volume
              mountPath: /shared
      {{- end }}
      containers:
        - name: {{ .Chart.Name }}
          image: "{{ if .Values.image }}{{ .Values.image.repository | default "ghcr.io/opennsw/nsw-agency-backend" }}{{ else }}ghcr.io/opennsw/nsw-agency-backend{{ end }}:{{ if .Values.image }}{{ .Values.image.tag | default .Chart.AppVersion }}{{ else }}{{ .Chart.AppVersion }}{{ end }}"
          imagePullPolicy: {{ if .Values.image }}{{ .Values.image.pullPolicy | default "IfNotPresent" }}{{ else }}IfNotPresent{{ end }}
          ports:
            - name: http
              containerPort: {{ .Values.config.port }}
              protocol: TCP
          env:
            {{- if .Values.env }}
            {{- toYaml .Values.env | nindent 12 }}
            {{- end }}
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.config.database.credentialsSecretName | default (printf "%s-db-credentials" (include "nsw-agency-backend.fullname" .)) }}
                  key: {{ .Values.config.database.userKey | default "user" }}
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.config.database.credentialsSecretName | default (printf "%s-db-credentials" (include "nsw-agency-backend.fullname" .)) }}
                  key: password
            - name: PORT
              value: {{ .Values.config.port | default "8081" | quote }}
            - name: DB_DRIVER
              value: {{ .Values.config.database.driver | default "postgres" | quote }}
            - name: DB_HOST
              value: {{ .Values.config.database.host | default "nsw-db" | quote }}
            - name: DB_PORT
              value: {{ .Values.config.database.port | default "5432" | quote }}
            - name: DB_NAME
              value: {{ .Values.config.database.name | quote }}
            - name: DB_SSLMODE
              value: {{ .Values.config.database.sslMode | default "disable" | quote }}
            - name: DEFAULT_TASK_CONFIG_ID
              value: {{ .Values.config.defaultFormId | default "default" | quote }}
            - name: ALLOWED_ORIGINS
              value: {{ .Values.config.allowedOrigins | quote }}
            - name: NSW_API_BASE_URL
              value: {{ .Values.config.nswApiBaseUrl | quote }}
            - name: NSW_CLIENT_ID
              value: {{ .Values.config.nswClientId | quote }}
            - name: NSW_CLIENT_SECRET
              value: {{ .Values.config.nswClientSecret | quote }}
            - name: NSW_TOKEN_URL
              value: {{ .Values.config.nswTokenUrl | quote }}
            - name: USE_WORKFLOW_MANAGER_V2
              value: {{ .Values.config.useWorkflowManagerV2 | default "true" | quote }}
            - name: CONFIG_DIR
              value: "/opt/nsw-agency/data"
            - name: FORM_TEMPLATES_DIR
              value: "/app/data/forms"
          volumeMounts:
            - name: forms-volume
              mountPath: /app/data/forms
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 3
            periodSeconds: 10
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            capabilities:
              drop: ["ALL"]
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      volumes:
        - name: forms-volume
          {{- if .Values.templates.enabled }}
          emptyDir: {}
          {{- else }}
          configMap:
            name: {{ include "nsw-agency-backend.fullname" . }}-forms
          {{- end }}
